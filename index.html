<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠打刻</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px;
}

h1 {
  font-size: 1.4rem;
  color: #2d3748;
  margin-bottom: 6px;
}

#clock {
  font-size: 2.6rem;
  font-weight: bold;
  color: #2b6cb0;
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}

#date {
  font-size: 1rem;
  color: #718096;
  margin-bottom: 24px;
}

/* ============ 画面切り替え ============ */
.screen { display: none; width: 100%; max-width: 480px; }
.screen.active { display: block; }

/* ============ 画面1：スタッフ一覧 ============ */
#screen-list h2 {
  font-size: 1rem;
  color: #718096;
  margin-bottom: 14px;
}

.staff-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 18px 20px;
  margin-bottom: 12px;
  border: none;
  border-radius: 14px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.staff-btn:active { transform: scale(0.98); }

.staff-btn.status-none { background: #fff;     color: #2d3748; }
.staff-btn.status-in   { background: #c6f6d5; color: #22543d; }
.staff-btn.status-out  {
  background: #e2e8f0; color: #a0aec0;
  cursor: default; pointer-events: none;
}

.status-badge {
  font-size: 0.78rem;
  font-weight: normal;
  padding: 4px 10px;
  border-radius: 20px;
}
.status-none .status-badge { background: #e2e8f0; color: #718096; }
.status-in   .status-badge { background: #9ae6b4; color: #22543d; }
.status-out  .status-badge { background: #cbd5e0; color: #718096; }

/* ============ 画面2：打刻 ============ */
#screen-stamp {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  padding: 36px 28px;
  text-align: center;
}

#back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: #4a90e2;
  font-size: 0.95rem;
  cursor: pointer;
  margin-bottom: 24px;
  padding: 0;
}
#back-btn:hover { text-decoration: underline; }

#stamp-name {
  font-size: 1.6rem;
  font-weight: bold;
  color: #2d3748;
  margin-bottom: 6px;
}

#stamp-status-msg {
  font-size: 0.9rem;
  color: #718096;
  margin-bottom: 32px;
}

.stamp-btn-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.stamp-action-btn {
  padding: 22px 0;
  font-size: 1.2rem;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.stamp-action-btn:active:not(:disabled) { transform: scale(0.97); }
.stamp-action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

#stamp-in-btn  { background: #3182ce; color: #fff; }
#stamp-out-btn { background: #e53e3e; color: #fff; }

#stamp-result {
  padding: 14px 16px;
  border-radius: 10px;
  font-size: 1rem;
  display: none;
}
#stamp-result.success { background: #c6f6d5; color: #276749; }
#stamp-result.error   { background: #fed7d7; color: #9b2c2c; }

#loading {
  color: #a0aec0;
  font-size: 0.95rem;
  margin-top: 8px;
  display: none;
}
</style>
</head>
<body>

<h1>勤怠打刻</h1>
<div id="clock">--:--:--</div>
<div id="date">--</div>

<!-- 画面1：スタッフ一覧 -->
<div id="screen-list" class="screen active">
  <h2>スタッフを選んでください</h2>
  <div id="staff-list">
    <p style="color:#a0aec0">読み込み中...</p>
  </div>
</div>

<!-- 画面2：打刻 -->
<div id="screen-stamp" class="screen">
  <button id="back-btn">← 一覧に戻る</button>
  <div id="stamp-name">--</div>
  <div id="stamp-status-msg">--</div>
  <div class="stamp-btn-group">
    <button class="stamp-action-btn" id="stamp-in-btn"  disabled>出勤</button>
    <button class="stamp-action-btn" id="stamp-out-btn" disabled>退勤</button>
  </div>
  <div id="stamp-result"></div>
  <div id="loading">処理中...</div>
</div>

<script>
// ============ 時計 ============
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('date').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
}
setInterval(updateClock, 1000);
updateClock();

// ============ 状態管理 ============
let staffData    = [];   // [{id, name, status}]  status: 'none'|'in'|'out'
let currentStaff = null;

// ============ 画面切り替え ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============ スタッフ一覧＋本日状況を取得 ============
async function loadStaff() {
  try {
    const [staffRes, statusRes] = await Promise.all([
      fetch('get_staff.php'),
      fetch('get_today_status.php'),
    ]);
    const staffJson  = await staffRes.json();
    const statusJson = await statusRes.json();

    if (!staffJson.success) throw new Error(staffJson.message);

    staffData = staffJson.staff.map(s => ({ ...s, status: 'none' }));

    if (statusJson.success) {
      statusJson.statuses.forEach(row => {
        const s = staffData.find(s => s.id == row.staff_id);
        if (s) s.status = row.status;
      });
    }

    renderList();
  } catch (e) {
    document.getElementById('staff-list').innerHTML =
      `<p style="color:#e53e3e">スタッフ一覧の取得に失敗しました</p>`;
  }
}

// ============ 一覧描画 ============
function renderList() {
  const container = document.getElementById('staff-list');
  container.innerHTML = '';
  const labelMap = { none: '未出勤', in: '在籍中', out: '退勤済' };

  staffData.forEach(s => {
    const btn = document.createElement('button');
    btn.className = `staff-btn status-${s.status}`;
    btn.innerHTML = `
      <span>${s.name}</span>
      <span class="status-badge">${labelMap[s.status]}</span>
    `;
    if (s.status !== 'out') {
      btn.addEventListener('click', () => openStamp(s));
    }
    container.appendChild(btn);
  });
}

// ============ 打刻画面を開く ============
function openStamp(staff) {
  currentStaff = staff;
  document.getElementById('stamp-name').textContent = staff.name + ' さん';
  const msgMap = { none: '本日はまだ出勤していません', in: '現在出勤中です' };
  document.getElementById('stamp-status-msg').textContent = msgMap[staff.status] || '';
  document.getElementById('stamp-in-btn').disabled  = (staff.status !== 'none');
  document.getElementById('stamp-out-btn').disabled = (staff.status !== 'in');
  const result = document.getElementById('stamp-result');
  result.style.display = 'none';
  result.className = '';
  showScreen('screen-stamp');
}

// ============ 打刻実行 ============
async function doStamp(type) {
  if (!currentStaff) return;

  const loading = document.getElementById('loading');
  const result  = document.getElementById('stamp-result');
  const inBtn   = document.getElementById('stamp-in-btn');
  const outBtn  = document.getElementById('stamp-out-btn');

  inBtn.disabled = outBtn.disabled = true;
  loading.style.display = 'block';
  result.style.display  = 'none';

  try {
    const fd = new FormData();
    fd.append('staff_id', currentStaff.id);
    fd.append('type', type);

    const res  = await fetch('stamp.php', { method: 'POST', body: fd });
    const data = await res.json();

    loading.style.display = 'none';
    result.className     = data.success ? 'success' : 'error';
    result.textContent   = data.message;
    result.style.display = 'block';

    if (data.success) {
      // ローカル状態を更新
      currentStaff.status = type;
      const s = staffData.find(s => s.id === currentStaff.id);
      if (s) s.status = type;

      // 1.2秒後に一覧へ戻る
      setTimeout(() => {
        renderList();
        showScreen('screen-list');
      }, 1200);
    } else {
      inBtn.disabled  = (currentStaff.status !== 'none');
      outBtn.disabled = (currentStaff.status !== 'in');
    }
  } catch (e) {
    loading.style.display = 'none';
    result.className     = 'error';
    result.textContent   = '通信エラーが発生しました';
    result.style.display = 'block';
    inBtn.disabled  = (currentStaff.status !== 'none');
    outBtn.disabled = (currentStaff.status !== 'in');
  }
}

// ============ イベント ============
document.getElementById('stamp-in-btn') .addEventListener('click', () => doStamp('in'));
document.getElementById('stamp-out-btn').addEventListener('click', () => doStamp('out'));
document.getElementById('back-btn')     .addEventListener('click', () => showScreen('screen-list'));

// ============ 初期化 ============
loadStaff();
</script>
</body>
</html>
