<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者機能</title>
<link rel="stylesheet" href="css/admin.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<h1>管理者機能</h1>

<!-- 認証画面 -->
<div id="screen-auth">
  <h2>🔒 管理者ログイン</h2>
  <input type="password" id="pw-input" placeholder="パスワードを入力" />
  <button id="auth-btn">ログイン</button>
  <div id="auth-error">パスワードが違います</div>
</div>

<!-- ログ画面 -->
<div id="screen-log">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-today">当日ログ</button>
    <button class="tab-btn"        id="tab-month">当月ログ</button>
    <button class="tab-btn"        id="tab-fix">打刻修正</button>
    <button class="tab-btn"        id="tab-staff">スタッフ管理</button>
  </div>

  <!-- 当月ログ用コントロール -->
  <div id="month-selector" style="display:none">
    <label>対象月：</label>
    <input type="month" id="month-input" />
    <button id="reload-btn">再読込</button>
    <button id="export-btn" disabled>📥 Excel出力</button>
  </div>

  <!-- 当日・当月ログテーブル -->
  <div class="log-card">
    <div id="log-message">読み込み中...</div>
    <div id="log-table-wrap" style="display:none">
      <table id="log-table">
        <thead id="log-thead"></thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 打刻修正パネル -->
  <div id="fix-panel" style="display:none">
    <div class="log-card" style="padding:24px">
      <div class="fix-search-bar">
        <input type="date" id="fix-date" />
        <select id="fix-staff">
          <option value="">スタッフを選択</option>
        </select>
        <button id="fix-search-btn">検索</button>
      </div>
      <div id="fix-result">
        <p class="msg-placeholder">日付とスタッフを選んで検索してください</p>
      </div>
      <div id="fix-msg" style="display:none"></div>
    </div>
  </div>

  <!-- スタッフ管理パネル -->
  <div id="staff-panel" style="display:none">
    <div class="log-card" style="padding:24px">
      <div class="staff-add-bar">
        <input type="text" id="new-staff-name" placeholder="氏名を入力" />
        <button id="add-staff-btn">追加</button>
      </div>
      <div id="staff-list-admin">
        <p class="msg-placeholder">読み込み中...</p>
      </div>
      <div id="staff-msg" style="display:none"></div>
    </div>
  </div>

  <button id="logout-btn">ログアウト</button>
</div>

<script src="js/admin.js"></script>
</body>
</html>
